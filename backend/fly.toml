# Fly.io deployment configuration for AtmoLens Backend

app = "atmolens-backend"
primary_region = "ewr"  # Newark - change to nearest region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = false  # Keep running for scheduled tasks
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/status"

[env]
  HOST = "0.0.0.0"
  PORT = "8001"
  FETCH_INTERVAL_MINUTES = "30"
  ARCHIVE_DAYS = "7"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "atmolens_maps"
  destination = "/app/maps"
  initial_size = "1gb"
